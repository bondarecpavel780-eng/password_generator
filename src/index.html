<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="top-bar">
        <div class="logo-wrapper">
            <img src="icons/logo.png" alt="Logo" class="logo">
        </div>
    </header>

    <div class="container">
        <button id="customize-btn" class="outline-btn">Customize</button>

        <div id="customize-modal" class="modal-overlay">
            <div class="modal-content">
                <button id="close-modal-btn" class="close-btn">&times;</button>
                <h2>Customize</h2>
                <div class="modal-body">
                    <div class="input-group">
                        <label for="custom-length">Length password:</label>
                        <input type="number" id="custom-length" min="4" max="100" value="12">
                    </div>

                    <div class="input-group">
                        <label for="custom-complexity">Complexity:</label>
                        <select id="custom-complexity">
                            <option value="numbers">Only Numbers</option>
                            <option value="small letters">Only Small Letters</option>
                            <option value="large letters">Only Large Letters</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="super">Super</option>
                        </select>
                            <label for="custom-word">Include word (optional):</label>
                            <input type="text" id="custom-word" placeholder="your word">
                        
                        <div class="toggle-wrapper">
                            <span class="toggle-label">Random placement:</span>
                            <label class="switch">
                                <input type="checkbox" id="random-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <button id="apply-settings-btn" class="apply-btn">Apply Settings</button>
                </div>
            </div>
        </div>
        <h1>Password Generator</h1>

        <div class="password-display">
            <span id="password-output">Here will be your password...</span>
        </div>

        <div class="complexity-controls">
            <button class="complexity-btn active" data-level="low">Low</button>
            <button class="complexity-btn" data-level="medium">Medium</button>
            <button class="complexity-btn" data-level="high">High</button>
            <button class="complexity-btn" data-level="super">Super</button>
        </div>

        <div class="actions-wrapper">
            <div class="copy-wrapper">
                <button id="copy-btn">Copy Password</button>
                <span id="copy-toast" class="toast">Success!</span>
            </div>

            <button id="qr-btn" class="outline-btn">QR-код</button>
        </div>

        <div id="qr-container" class="qr-box"></div>

        <button id="generate-btn">Generate Password</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="script.js/main.js"></script>
</body>

</html>
